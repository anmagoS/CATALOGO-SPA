<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANMAGO STORE</title>
  <link rel="stylesheet" href="ESTILO.CSS" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
      <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
          />
</head>
<body>
  <!-- HEADER FIJO -->
header class="header">
          <div class="logo" style="color: #bfd8e2;">ANMAGO STORE</div>
    <nav class="nav">
      <a href="INICIO.HTML" class="nav-link">Inicio</a>
      <div class="dropdown">
        <button class="dropdown-toggle" id="toggle-categorias">Productos</button>
        <div class="dropdown-menu" id="menu-categorias"></div>
      </div>
         </nav>
    <div class="carrito">
      <!-- Botón del carrito -->
    <div class="position-relative">
      <a
        href="#"
        class="btn btn_shopping cart-badge position-fixed top-0 end-0 me-4 mt-3 swing-on-hover border bg-white"
      >
        <i class="bi-bag-heart"></i>
        <span
          id="contador-carrito"
          class="position-absolute top-1 start-100 translate-middle badge rounded-pill bg-danger"
        >
          0
        </span>
      </a>
    </div>
      </header>
           <!-- CONTENIDO PRINCIPAL -->
  <main id="contenido-productos" class="grid-productos"></main>
  
<!-- Offcanvas del carrito -->
    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="offcanvasRight"
      aria-labelledby="offcanvasRightLabel"
    >
      <div class="offcanvas-header border-bottom">
        <h4 class="offcanvas-title text-center">Carrito de compras</h4>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>

      <div class="offcanvas-body border-bottom"></div>

      <div class="offcanvas-footer mt-4">
        <h5 class="justify-content-between mb-2">
          <span class="fw-bold px-3">SUBTOTAL:</span>
          <span id="subtotal" class="fw-bold float-end px-2 fs-2"> $0.00 </span>
        </h5>
        <div class="text-center mb-5 px-3">
          <button class="btn btn-primary mt-5 w-100" onclick="generarPedidoWhatsApp()">
            Enviar pedido por WhatsApp
          </button>
        </div>
      </div>
    </div>
    

  <!-- MODAL GALERÍA CON CARRUSEL -->
  <div id="modal-galeria" class="modal-imagen">
    <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
    <button id="prev" class="nav-galeria">&#10094;</button>
    <img id="imagen-actual" class="imagen-modal" src="" alt="Producto">
    <button id="next" class="nav-galeria">&#10095;</button>
    </div>
  
  <!-- FOOTER DINÁMICO -->
  <div id="footer-container"></div>

  <!-- SCRIPT PRINCIPAL -->
  <script>
    let catalogoGlobal = {};
    let imagenesGaleria = [];
    let indiceActual = 0;

    async function cargarCatalogo() {
      const url = "https://raw.githubusercontent.com/anmagoS/CATALOGO-SPA/main/catalogo.json";
      const respuesta = await fetch(url);
      const data = await respuesta.json();
      catalogoGlobal = data;
      renderMenuCategorias(data);

      const categoriaGuardada = localStorage.getItem('categoriaSeleccionada');
      if (categoriaGuardada && data[categoriaGuardada]) {
        mostrarProductosPorCategoria(categoriaGuardada);
        localStorage.removeItem('categoriaSeleccionada');
      } else {
        mostrarProductosPorCategoria(Object.keys(data)[0]);
      }
    }

    function renderMenuCategorias(data) {
      const menu = document.getElementById("menu-categorias");
      menu.innerHTML = "";
      for (const categoria in data) {
        const item = document.createElement("a");
        item.className = "dropdown-item";
        item.textContent = categoria;
        item.href = "#";
        item.onclick = (e) => {
          e.preventDefault();
          mostrarProductosPorCategoria(categoria);
          menu.style.display = "none";
        };
        menu.appendChild(item);
      }
    }

    function mostrarProductosPorCategoria(categoria) {
      const contenedor = document.getElementById("contenido-productos");
      contenedor.innerHTML = "";

      const subcategorias = catalogoGlobal[categoria];
      for (const subcategoria in subcategorias) {
        const productos = subcategorias[subcategoria];
        productos.forEach(producto => {
          const imagen = producto["IMAGEN 1"];
          const nombre = producto["PRODUCTO"];
          const precio = producto["PRECIO"];
          const boton = producto["BOTON"];
          const urls = producto["URL"]?.split(",").map(u => u.trim()).filter(u => u);

          const tarjeta = document.createElement("div");
          tarjeta.className = "producto";
          tarjeta.innerHTML = `
            <div class="imagen-producto" onclick='abrirGaleria(${JSON.stringify(urls)})'>
              <img src="${imagen}" alt="${nombre}">
            </div>
            <div class="nombre-producto">${nombre}</div>
            <div class="precio-producto">$${precio} COP</div>
            <button class="btn-cart w-100 mt-auto"
            data-categoria="${producto["CATEGORIA"]}"
    data-subcategoria="${producto["SUBCATEGORIA"]}">
          Agregar al carrito &nbsp; <i class="bi bi-cart-plus"></i>
      </button>`;
          contenedor.appendChild(tarjeta);
        });
      }
    }

    function abrirGaleria(imagenes) {
      imagenesGaleria = imagenes;
      indiceActual = 0;
      actualizarImagenModal();
      document.getElementById("modal-galeria").style.display = "flex";
     }
    
    function actualizarImagenModal() {
      const img = document.getElementById("imagen-actual");
      img.src = imagenesGaleria[indiceActual];
      
    }

    function cerrarModal() {
      document.getElementById("modal-galeria").style.display = "none";
    }

    document.getElementById("prev").onclick = () => {
      indiceActual = (indiceActual - 1 + imagenesGaleria.length) % imagenesGaleria.length;
      actualizarImagenModal();
    };

    document.getElementById("next").onclick = () => {
      indiceActual = (indiceActual + 1) % imagenesGaleria.length;
      actualizarImagenModal();
    };

    document.getElementById("toggle-categorias").addEventListener("click", () => {
      const menu = document.getElementById("menu-categorias");
      const isVisible = menu.style.display === "block";
      menu.style.display = isVisible ? "none" : "block";
    });

    cargarCatalogo();
  </script>
  
  <!-- FOOTER DINÁMICO -->
  <script>
    fetch('footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="app.js"></script>
        <script src="obtener_productos.js"></script>
</body>
</html>
